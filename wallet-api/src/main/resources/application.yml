spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/showcase_db
    username: admin
    password: adminpassword

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true

  graphql:
    graphiql:
      enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 600000 # Tempo de vida do cache em milissegundos (Ex: 10 minutos)
      cache-null-values: false